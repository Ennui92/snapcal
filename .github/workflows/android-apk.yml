name: Android APK

# Builds the release APK and publishes it to the `android-latest` release,
# which is the URL the landing page and README link to:
# https://github.com/Ennui92/snapcal/releases/download/android-latest/snapcal.apk
#
# Requires the EXPO_PUBLIC_GEMINI_KEY repo secret (Settings → Secrets and
# variables → Actions). Without it the AI analysis in the shipped app would
# silently do nothing, so the build fails fast instead.
#
# Optional signing secrets — if set, the APK is re-signed with your own
# keystore (e.g. preview.jks) instead of the Expo debug keystore:
#   ANDROID_KEYSTORE_BASE64   base64 -w0 preview.jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD      (defaults to the keystore password if unset)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: android-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: build + publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Require Gemini key
        env:
          GEMINI_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_KEY }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "::error::The EXPO_PUBLIC_GEMINI_KEY repo secret is not set. Add it under Settings → Secrets and variables → Actions (key from aistudio.google.com/apikey), then re-run this workflow. Building without it would ship an APK whose AI analysis silently fails."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        env:
          EXPO_PUBLIC_GEMINI_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_KEY }}
        run: cd android && ./gradlew :app:assembleRelease

      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk snapcal.apk

      - name: Re-sign with own keystore (optional)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret — keeping the Expo debug-keystore signature (fine for sideloading)."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > /tmp/release.jks
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:${KEY_PASSWORD:-$KEYSTORE_PASSWORD}" \
            snapcal.apk
          rm /tmp/release.jks
          echo "Re-signed with the provided keystore."

      - name: Publish to android-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="SnapCal v$(node -p "require('./app.json').expo.version") — built from ${GITHUB_SHA::7} on $(date -u +%F). Download snapcal.apk below and open it on your phone to install."
          if gh release view android-latest --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload android-latest snapcal.apk --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit android-latest --notes "$NOTES" --repo "$GITHUB_REPOSITORY"
          else
            gh release create android-latest snapcal.apk \
              --title "SnapCal for Android (latest)" \
              --notes "$NOTES" \
              --latest \
              --repo "$GITHUB_REPOSITORY"
          fi
          echo "APK live at: https://github.com/$GITHUB_REPOSITORY/releases/download/android-latest/snapcal.apk"
